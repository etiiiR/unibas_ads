plugins{
  id 'java'
  id 'application'
  id 'checkstyle'
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.7.1'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

checkstyle {
    toolVersion = "10.12.4"
}

test {
    useJUnitPlatform()
}

application {
    mainClass = 'Main'
}
